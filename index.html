<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="src/css/fonts.css" />
    <link rel="stylesheet" href="src/css/style.css" />
    <script type="module" src="src/js/controller.js"></script>
    <title>Geex Task</title>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="logo">Geex Task</h1>
      </header>

      <main class="app flex">
        <div class="todo__inbox todo flex">
          <h2 class="todo__title">
            <label for="todo__inbox" class="todo__label">One</label>
          </h2>
          <input
            type="text"
            name="todo__inbox"
            id="todo__inbox"
            placeholder="What's on your mind..."
          />
          <ul>
            <li>
              <input type="checkbox" id="one" />
              <label for="one">one</label>
            </li>
          </ul>
        </div>
        <div class="todo__routines todo flex">
          <h2 class="todo__title">
            <label for="todo__routines" class="todo__label">Two</label>
          </h2>
          <input
            type="text"
            name="todo__routines"
            id="todo__routines"
            placeholder="What's on your mind..."
          />
          <ul>
            <li>
              <input type="checkbox" id="two" />
              <label for="two">two</label>
            </li>
          </ul>
        </div>
        <div class="todo__goals todo flex">
          <h2 class="todo__title">
            <label for="todo__goals" class="todo__label">Three</label>
          </h2>
          <input
            type="text"
            name="todo__goals"
            id="todo__goals"
            placeholder="What's on your mind..."
          />
          <ul>
            <li>
              <input type="checkbox" />
              <label>three</label>
            </li>
          </ul>
        </div>
      </main>
      <nav class="nav flex">
        <ul class="flex">
          <li><a href="">Tasks</a></li>
          <li><a href="">Pomodoro</a></li>
          <li><a href="">Countdown</a></li>
          <li><a href="">White Noise</a></li>
        </ul>
      </nav>
    </div>
  </body>
</html>
